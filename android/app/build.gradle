plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// Release signing credentials are kept out of source control in
// android/key.properties (git-ignored). See android/key.properties.example.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

//def flutterRoot = localProperties.getProperty('flutter.sdk')
//if (flutterRoot == null) {
//    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
//}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

//apply plugin: 'com.android.application'
//apply plugin: 'kotlin-android'
////apply plugin: 'com.google.gms.google-services'
//apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
//    compileSdkVersion flutter.compileSdkVersion
    compileSdk 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    namespace("com.saigonphantomlabs.base")
    buildFeatures {
        buildConfig true
    }

    defaultConfig {
//        applicationId "com.saigonphantomlabs.base"
        applicationId "com.roy.admobwrapper"

        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 24
        //noinspection EditedTargetSdkVersion
        targetSdkVersion 36

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled = true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    // APK Split configuration disabled to fix R8 compilation
    // splits {
    //     abi {
    //         enable true
    //         reset()
    //         include 'arm64-v8a', 'armeabi-v7a'
    //         universalApk false
    //     }
    //     density {
    //         enable true
    //         reset()
    //         include 'mdpi', 'hdpi', 'xhdpi', 'xxhdpi', 'xxxhdpi'
    //     }
    // }

    buildTypes {
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            zipAlignEnabled true
            // Tối ưu code optimization
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release

            // Nén resources và optimize
            crunchPngs true

            // Bundle optimization
            manifestPlaceholders = [enableCrashlytics: "true"]
        }
        debug {
            minifyEnabled false
            shrinkResources false
            zipAlignEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            manifestPlaceholders = [enableCrashlytics: "false"]
        }
    }

}

flutter {
    source '../..'
}

dependencies {
//    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
//    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.10"
    implementation("androidx.multidex:multidex:2.0.1")
//    implementation 'androidx.window:window:1.0.0'
//    implementation 'androidx.window:window-java:1.0.0'
//    implementation platform('com.google.firebase:firebase-bom:33.2.0')
//    implementation 'com.google.firebase:firebase-analytics'
//    implementation 'com.google.firebase:firebase-messaging:24.0.1'
//    implementation("com.google.firebase:firebase-appcheck-playintegrity")
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation("com.google.ads.mediation:applovin:13.2.0.1")
    // Giữ splash Android 12+ lại đủ lâu để AnimatedVectorDrawable kịp chạy
    // (xem MainActivity.onCreate + doc/SPLASH_SETUP.md).
    implementation("androidx.core:core-splashscreen:1.0.1")
}
