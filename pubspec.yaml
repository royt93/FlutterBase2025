name: saigonphantomlabs
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 2026.04.27+20260427

environment:
  sdk: '>=2.19.6 <4.0.0'
dependencies:
  flutter:
    sdk: flutter

  marquee: ^2.3.0
  image_picker: ^1.2.1
  mime: ^2.0.0
  in_app_review: ^2.0.11
  url_launcher: ^6.3.2

  # Core dependencies - essential only
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network & Performance
  dio: ^5.9.0
  network_info_plus: ^6.0.2
  connectivity_plus: ^6.1.1

  # UI Components - minimal set
  fl_chart: ^1.1.1
  toastification: ^3.0.3

  # Essential utilities
  device_info_plus: ^12.3.0
  flutter_displaymode: ^0.7.0
  permission_handler: ^12.0.1
  wakelock_plus: ^1.4.0

  # Core platform
  intl:
  path:
  path_provider: ^2.1.4
  share_plus: ^10.1.2

# Hosted — ACTIVE: 1.0.23 published to pub.dev (VIP stacking + bypassVipGuard + App-Open-over-modal guard):
  applovin_admob_sdk: ^1.0.23
  # Local path override (re-enable + comment the hosted line above to ship in-repo SDK changes):
  #  applovin_admob_sdk:
  #    path: packages/ad_sdk

  # Bắt buộc ở app-level: native mediation plugin, không khai báo được trong sub-package
  gma_mediation_applovin:

  # Essential UI feedback
  vibration: ^3.1.5
  flutter_easyloading: ^3.0.5
  # Celebration animation on VIP activation success (Q18A).
  confetti: ^0.7.0

#  dart run rename_app:main all="My App Name"
#  rename_app: ^1.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  flutter_native_splash:
  change_app_package_name: ^1.5.0

  # Testing dependencies
  mockito: ^5.6.1
  build_runner: ^2.10.4
  integration_test:
    sdk: flutter

  #https://pub.dev/packages/flutter_launcher_icons
  flutter_launcher_icons:
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ic_launcher.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/ic_launcher.png"
  adaptive_icon_padding: 0
#  flutter pub run flutter_launcher_icons:main

dependency_overrides:
  vector_math: ^2.2.0
  # Ghim applovin_max về 4.6.0 (AppLovinSDK iOS 13.5.0) cho khớp với
  # gma_mediation_applovin 2.5.1 (adapter 13.5.0.0 -> AppLovinSDK 13.5.0).
  # Bản applovin_admob_sdk 1.0.18 kéo applovin_max 4.6.3 (AppLovinSDK 13.6.1)
  # gây xung đột pod vì chưa có gma tương thích trên google_mobile_ads ^6 / Flutter 3.35.1.
  applovin_max: 4.6.0
  # Local ad_sdk (path) khai báo google_mobile_ads ^7 / applovin_max ^4.6.4,
  # nhưng app này build ổn định trên cụm đã ghim (gma 2.5.1 + GMA 6 + applovin_max
  # 4.6.0). Ghim lại để path override không kéo GMA 7 (làm vỡ native registrant
  # của gma_mediation_applovin). VIP stacking độc lập với GMA version.
  google_mobile_ads: 6.0.0
  gma_mediation_applovin: 2.5.1

flutter:
  uses-material-design: true
  assets:
    # Only essential images - remove unused assets
    - assets/images/bkg_2.webp
    - assets/images/ic_launcher.png
    - assets/images/ic_go.webp
    - assets/images/ic_check_mark_green.webp
