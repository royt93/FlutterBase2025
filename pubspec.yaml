name: saigonphantomlabs
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 2025.09.27+20250927

environment:
  sdk: '>=2.19.6 <4.0.0'
dependencies:
  flutter:
    sdk: flutter

  # Core dependencies - essential only
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  shared_preferences: ^2.5.3

  # Network & Performance
  dio: ^5.9.0
  connection_notifier: ^2.0.1

  # UI Components - minimal set
  fl_chart: ^1.0.0
  toastification: ^3.0.3

  # Essential utilities
  device_info_plus: ^11.5.0
  flutter_displaymode: ^0.6.0
  permission_handler: ^12.0.1
  wakelock_plus: ^1.3.2

  # Core platform
  intl:
  path:

  # AdMob integration
  google_mobile_ads: ^6.0.0
  gma_mediation_applovin:

  # Essential UI feedback
  vibration: ^3.1.3
  flutter_easyloading: ^3.0.5

#  dart run rename_app:main all="My App Name"
#  rename_app: ^1.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  flutter_native_splash:
  change_app_package_name: ^1.5.0

  # Testing dependencies
  mockito: ^5.4.4
  build_runner: ^2.4.9
  integration_test:
    sdk: flutter

  #https://pub.dev/packages/flutter_launcher_icons
  flutter_launcher_icons:
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ic_launcher.png"
#  flutter pub run flutter_launcher_icons:main

flutter:
  uses-material-design: true
  assets:
    # Only essential images - remove unused assets
    - assets/images/bkg_2.jpg
    - assets/images/ic_launcher.png
    - assets/images/ic_go.png
    - assets/images/ic_check_mark_green.png
