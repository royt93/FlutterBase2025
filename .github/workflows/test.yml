name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # The ad SDK package owns all the automated tests (unit/widget/integration
  # under packages/ad_sdk/test/). This is the primary gate.
  sdk:
    name: ad_sdk — analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ad_sdk
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Run tests
        run: flutter test

  # T47 — the 20 integration_test/ files under packages/ad_sdk/example only ran
  # by hand on a simulator/device before this. Runs them on a real Android
  # emulator so real-device-shaped regressions (not just Dart-VM-reachable
  # ones) are caught in CI too. AdMob App ID/unit IDs in the example are
  # already Google's test IDs (see CLAUDE.md), so this is safe to run
  # unattended without risking real ad revenue/policy signals.
  sdk-integration:
    name: ad_sdk example — integration tests (Android emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
      - name: Install dependencies
        working-directory: packages/ad_sdk/example
        run: flutter pub get
      - name: Enable KVM (required for the emulator to boot on Linux runners)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          working-directory: packages/ad_sdk/example
          script: flutter test integration_test

  # The host app is mostly UI-only (gated on static analysis) but now ships a
  # small test/ dir for screens with real logic (e.g. VipScreen stacking). It
  # consumes the SDK via the in-repo path override, so no publish is needed.
  host:
    name: host app — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Run tests
        run: flutter test
