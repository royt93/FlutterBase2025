name: applovin_admob_sdk
description: Dual-provider ad SDK for Flutter (AdMob + AppLovin MAX). Adapter pattern, state machine, VIP redeem with Cupertino dialog, GDPR/COPPA/CCPA flags, exponential backoff, AdEvent stream, debug overlay.
version: 1.0.23
homepage: https://github.com/royt93/FlutterBase2025
repository: https://github.com/royt93/FlutterBase2025
issue_tracker: https://github.com/royt93/FlutterBase2025/issues


environment:
  sdk: '>=3.6.0 <4.0.0'
  # 3.27.0+ is required because the SDK uses `Color.withValues(alpha:)`
  # introduced in that release. Pinning lower would compile-fail on older
  # Flutter versions.
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^7.0.0
  applovin_max: ^4.6.4
  app_tracking_transparency: ^2.0.7
  shared_preferences: ^2.5.0
  advertising_id: ^2.7.1
  connection_notifier: ^2.0.1

  # Anti-uninstall-bypass guard for first-install VIP grace (iOS-side only).
  # See: lib/src/vip/_first_install_guard.dart
  # Android anti-bypass is handled by the host app's Auto Backup configuration
  # (`android:dataExtractionRules` restoring `FlutterSharedPreferences.xml`
  # on Play Store reinstall) — no plugin dependency needed.
  flutter_secure_storage: ^10.0.0       # iOS Keychain flag (survives uninstall by default)
  cryptography: ^2.9.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  fake_async: ^1.3.1

flutter:
  # This package does not use flutter_lints or other Flutter artifacts.
