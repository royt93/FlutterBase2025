# Cấu hình splash screen theo từng nền tảng.
# Màu nền chủ đạo #012f46 (xanh navy đậm) lấy từ nền ảnh assets/images/bkg_2.png
# để splash khớp màu với background (trước đây dùng #faf9f5 trắng kem nên viền
# ngoài ảnh iOS scaleAspectFill và nền Android bị lệch tông).
#
# Lệnh gen:  dart run flutter_native_splash:create
#
# Lưu ý Android 12+: flutter_native_splash KHÔNG có key `icon_animation`.
# Icon động (AnimatedVectorDrawable) được wiring native qua
# res/values-v31/styles.xml -> windowSplashScreenAnimatedIcon
# (file drawable: res/drawable/splash_icon_anim.xml).
flutter_native_splash:
  color: "#012f46"

  # iOS: ảnh background full màn hình (đã convert webp -> png cho LaunchScreen).
  background_image_ios: assets/images/bkg_2.png
  ios_content_mode: scaleAspectFill

  # Android < 12: launcher icon tĩnh, căn giữa.
  image_android: assets/images/ic_launcher.png

  # UX
  # fullscreen:false -> KHÔNG ẩn status bar. Trước đây fullscreen:true sinh
  # android:windowFullscreen vào LaunchTheme; FLAG_FULLSCREEN này dính lại window
  # cả sau khi Flutter load (NormalTheme không clear được) khiến status bar biến
  # mất toàn app. Edge-to-edge (UIUtils.initEdgeToEdge) vẫn vẽ content sau bar.
  fullscreen: false
  android_gravity: center

  # Android 12+ : nền + icon tĩnh (fallback). Icon động xử lý native sau gen.
  android_12:
    color: "#012f46"
    image: assets/images/ic_launcher_960.png

  web: false
